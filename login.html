<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page">
    <div class="card">
        <h1>Login</h1>
        <form action="dashboard.html">
            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <div class="input-group">
                    <input type="text" id="username" class="form-control" placeholder="Enter your username" required>
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                </div>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <div class="input-group">
                    <input type="password" id="password" class="form-control" placeholder="Enter your password" required>
                    <span class="input-group-text" onclick="togglePassword('password', this)">
                        <i class="bi bi-eye"></i>
                    </span>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100 mt-2" id="loginBtn">
                <span class="spinner-border spinner-border-sm me-2 d-none" id="loginSpinner"></span>
                <i class="bi bi-box-arrow-in-right me-2" id="loginIcon"></i>
                <span id="loginText">Login</span>
            </button>
        </form>
        <div class="divider">or</div>
        <form action="forgot-password.html">
            <button type="submit" class="btn btn-outline-secondary">
                <i class="bi bi-key me-2"></i>Forgot Password?
            </button>
        </form>
        <form action="register.html">
            <button type="submit" class="btn btn-outline-secondary">
                <i class="bi bi-person-plus me-2"></i>Create New Account
            </button>
        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.querySelector('form').addEventListener('submit', function() {
            document.getElementById('loginSpinner').classList.remove('d-none');
            document.getElementById('loginIcon').classList.add('d-none');
            document.getElementById('loginText').textContent = 'Logging in...';
        });
        function togglePassword(id, btn) {
            const input = document.getElementById(id);
            const icon = btn.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'bi bi-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'bi bi-eye';
            }
        }
    </script>
</body>
</html>
