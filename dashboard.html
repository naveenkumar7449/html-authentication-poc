<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="#">Dashboard</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navMenu">
                <div class="ms-auto">
                    <form action="login.html" class="d-inline">
                        <button type="submit" class="btn-logout">
                            <i class="bi bi-box-arrow-right"></i>Logout
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </nav>
    <div class="container mt-4">
        <div class="dashboard-info mb-4">
            You have successfully logged in. Welcome back!
        </div>
        <div class="row g-3">
            <div class="col-6 col-md-3">
                <div class="dash-stat">
                    <i class="bi bi-people-fill" style="color:#667eea;"></i>
                    <h5>1,284</h5>
                    <p>Users</p>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="dash-stat">
                    <i class="bi bi-bar-chart-fill" style="color:#2ecc71;"></i>
                    <h5>98.2%</h5>
                    <p>Uptime</p>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="dash-stat">
                    <i class="bi bi-bell-fill" style="color:#f39c12;"></i>
                    <h5>5</h5>
                    <p>Notifications</p>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="dash-stat">
                    <i class="bi bi-shield-check" style="color:#e74c3c;"></i>
                    <h5>2</h5>
                    <p>Alerts</p>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
